query GetEventsByDayAndMonthAndYear ($day: Int!, $month: Int!, $year: Int!) {
    getEventsByDayAndMonthAndYear(day: $day, month: $month, year: $year) {
        id
        title
        description
        startDate
        endDate
        track {
            name
            distance
            lapRecord
            website
            latitude
            longitude
        }
        participants {
            member {
                firstName
                lastName
                email
            }
        }
        organizer {
            name
        }
        price
        createdOn
        createdBy {
            id
            firstName
            lastName
        }
        modifiedOn
        modifiedBy {
            id
            firstName
            lastName
        }
    }
}